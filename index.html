<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Student Management System</title>

    <link rel="icon" href="data:,">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css" />

</head>

<body>
    <!-- SideBar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h1>EduTrack</h1>
            <p>Student Management System</p>
        </div>
        <nav class="Sidebar-nav">
            <div class="nav-label">Main</div>
            <button class="nav-item active" data-page="dashboard">Dashboard</button>
            <button class="nav-item" data-page="students">Students</button>
            <button class="nav-item" data-page="grades">Grades</button>
            <button class="nav-item" data-page="attendance">Attendance</button>

            <div class="nav-label" style="margin-top:8px">Analytics</div>
            <button class="nav-item" data-page="reports"><span class="icon">📈</span>Reports</button>
        </nav>
    </aside>

    <!--Main Content-->
    <main class="main">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:12px">
                <button class="hamburger" id="hamburger">☰</button>
                <span class="topbar-title" id="pageTitle">Dashboard</span>
            </div>
            <div class="topbar-right">
                <span class="live-badge" id="liveBadge">0 Students</span>
                <button class="btn btn-gold btn-sm" id="topAddBtn">Add Student + </button>
            </div>
        </header>
        <div class="content" id="content"></div>
    </main>

    <!-- Student Modal -->
    <div class="overlay" id="StudentOverlay">
        <div class="modal-head">
            <span class="modal-title" id="modalTitle">Add New Student</span>
            <button class="modal-close" data-close="StudentOverlay">Cancel</button>
        </div>

        <!--محتويات الفورم-->
        <div class="modal-body">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" id="iFirst" placeholder="Fares">
                    <span class="form-error" id="eFirst">First name is required</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" id="iLast" placeholder="Mohammed">
                    <span class="form-error" id="eLast">Last name is required</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="iEmail" placeholder="fares.mohammed@example.com">
                <span class="form-error" id="eEmail">Valid email is required</span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-input" id="iPhone" placeholder="0102345678">
                    <span class="form-error" id="ePhone">Valid phone number is required</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Year</label>
                    <select class="form-input" id="iYear">
                        <option value="">Select Year</option>
                        <option value="1">First Year</option>
                        <option value="2">Second Year</option>
                        <option value="3">Third Year</option>
                        <option value="4">Fourth Year</option>
                    </select>
                    <span class="form-error" id="eYear">Year is required</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Major</label>
                    <select class="form-input" id="iMajor">
                        <option value="">Select Major</option>
                        <option value="CS">Computer Science</option>
                        <option value="IT">Information Technology</option>
                        <option value="IS">Information Systems</option>
                        <option value="SE">Software Engineering</option>
                        <option value="DS">Data Science</option>
                        <option value="CY">Cybersecurity</option>
                    </select>
                    <span class="form-error" id="eMajor">Major is required</span>
                </div>
            </div>
        </div>

        <!--ازرار حفظ والغاء الاضافه-->
        <div class="modal-footer">
            <button class="btn btn-outline" data-close="studentOverlay">Cancel</button>
            <button class="btn btn-primary" id="saveStudentBtn">Save Student</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
