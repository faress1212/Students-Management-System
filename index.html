<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Student Management System</title>
    <link rel="icon" href="data:,">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SideBar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h1>EduTrack</h1>
            <p>Student Management System</p>
        </div>
        <nav class="Sidebar-nav">
            <div class="nav-label">Main</div>
            <button class="nav-item active" data-page="dashboard">Dashboard</button>
            <button class="nav-item" data-page="students">Students</button>
            <button class="nav-item" data-page="grades">Grades</button>
            <button class="nav-item" data-page="attendance">Attendance</button>
            <div class="nav-label" style="margin-top:8px">Analytics</div>
            <button class="nav-item" data-page="reports">📈 Reports</button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:12px">
                <button class="hamburger" id="hamburger">☰</button>
                <span class="topbar-title" id="pageTitle">Dashboard</span>
            </div>
            <div class="topbar-right">
                <span class="live-badge" id="liveBadge">0 Students</span>
                <button class="btn btn-gold btn-sm" id="topAddBtn">Add Student +</button>
            </div>
        </header>
        <div class="content" id="content"></div>
    </main>

    <!-- Toasts -->
    <div id="toasts"></div>

    <div class="overlay" id="studentOverlay">
        <div class="modal-head">
            <span class="modal-title" id="modalTitle">Add New Student</span>
            <button class="modal-close" data-close="studentOverlay">Cancel</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" id="iFirst" placeholder="Ahmed">
                    <span class="form-error" id="eFirst">First name is required</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" id="iLast" placeholder="Hassan">
                    <span class="form-error" id="eLast">Last name is required</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="iEmail" placeholder="ahmed@example.com">
                <span class="form-error" id="eEmail">Valid email is required</span>
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" class="form-input" id="iPhone" placeholder="01012345678">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Year</label>
                    <select class="form-input" id="iYear">
                        <option value="">Select Year</option>
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3">Year 3</option>
                        <option value="4">Year 4</option>
                    </select>
                    <span class="form-error" id="eYear">Year is required</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Major</label>
                    <select class="form-input" id="iMajor">
                        <option value="">Select Major</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Cybersecurity">Cybersecurity</option>
                    </select>
                    <span class="form-error" id="eMajor">Major is required</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" data-close="studentOverlay">Cancel</button>
            <button class="btn btn-primary" id="saveStudentBtn">Save Student</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
